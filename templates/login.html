<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZYGANT — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary:    #0a0e14;
      --bg-secondary:  #0f1520;
      --bg-card:       #111a27;
      --accent:        #00d4ff;
      --accent-glow:   rgba(0,212,255,0.15);
      --border:        #1e2d3d;
      --border-accent: #00d4ff44;
      --text-primary:  #e8f0fe;
      --text-secondary:#8899aa;
      --text-muted:    #445566;
      --danger:        #ff4757;
      --success:       #2ed573;
      --font-display:  'Rajdhani', sans-serif;
      --font-mono:     'Share Tech Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-display);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* background grid lines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand-icon { font-size: 2rem; color: var(--accent); display: block; margin-bottom: 0.5rem; }

    .brand-name {
      font-family: var(--font-mono);
      font-size: 1.8rem;
      letter-spacing: 6px;
      color: var(--accent);
      display: block;
    }

    .brand-sub {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-top: 0.25rem;
      display: block;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2rem;
    }

    .login-title {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .form-input {
      width: 100%;
      padding: 0.6rem 0.9rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text-primary);
      font-family: var(--font-display);
      font-size: 0.95rem;
      transition: border-color 0.2s;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }

    .login-btn {
      width: 100%;
      padding: 0.75rem;
      background: var(--accent);
      color: #000;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 2px;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s;
    }

    .login-btn:hover { opacity: 0.85; }

    .error-msg {
      background: rgba(255,71,87,0.1);
      border: 1px solid rgba(255,71,87,0.3);
      color: var(--danger);
      padding: 0.6rem 0.9rem;
      border-radius: 2px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }

    .error-msg.visible { display: block; }

    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="login-wrapper">

    <div class="login-brand">
      <span class="brand-icon">⬡</span>
      <span class="brand-name">ZYGANT</span>
      <span class="brand-sub">AI-POWERED VULNERABILITY PRIORITIZATION</span>
    </div>

    <div class="login-card">
      <div class="login-title">// SECURE LOGIN</div>

      <!-- Flash error message from Flask -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="error-msg visible">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="you@zygant.io" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="login-btn">LOGIN →</button>
      </form>
    </div>

    <div class="login-footer">
      Group 11 &mdash; Sheridan College INFO49402 &mdash; ZYGANT &copy; 2025
    </div>

  </div>

</body>
</html>
